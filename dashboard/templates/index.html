<!DOCTYPE html>
<html>

<head>
    <title>Secure File Monitor Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        h2 {
            color: #38bdf8;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        pre {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }

        #stats {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        canvas {
            background: white;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <h1>🔐 Secure File Monitor Dashboard</h1>

    <button onclick="loadLogs()">Load Logs</button>

    <div id="stats">
        Statistics will appear here
    </div>

    <h2>📈 Activity Graph</h2>
    <canvas id="activityChart"></canvas>

    <h2>🚨 Security Alerts</h2>
    <pre id="alerts">No alerts loaded</pre>

    <h2>📄 Audit Logs</h2>
    <pre id="output">Click "Load Logs" to view data</pre>

    <script>

        async function loadLogs() {

            // Load Logs
            const res = await fetch("/logs");
            const data = await res.json();

            document.getElementById("output").innerText =
                JSON.stringify(data, null, 2);

            // Load Statistics
            const summary = await fetch("/summary");
            const stats = await summary.json();

            document.getElementById("stats").innerHTML = `
                <h2>📊 Statistics</h2>
                <p><b>Total Events:</b> ${stats.total}</p>
                <p><b>Created:</b> ${stats.created}</p>
                <p><b>Modified:</b> ${stats.modified}</p>
                <p><b>Moved:</b> ${stats.moved}</p>
                <p><b>Deleted:</b> ${stats.deleted}</p>
            `;

            // Activity Chart
            const ctx = document.getElementById("activityChart");

            if (window.activityChartInstance) {
                window.activityChartInstance.destroy();
            }

            window.activityChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [
                        'Created',
                        'Modified',
                        'Moved',
                        'Deleted'
                    ],
                    datasets: [{
                        label: 'File Events',
                        data: [
                            stats.created,
                            stats.modified,
                            stats.moved,
                            stats.deleted
                        ]
                    }]
                },
                options: {
                    responsive: true
                }
            });

            // Load Alerts
            const alertRes = await fetch("/alerts");
            const alertData = await alertRes.json();

            document.getElementById("alerts").innerText =
                JSON.stringify(alertData, null, 2);
        }

setInterval(loadLogs, 3000);

    </script>

</body>

</html>
